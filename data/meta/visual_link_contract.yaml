# visual_links[]：{ view, params [, label] } → App.vue setAgentVisualLink → 各 View watch
# HTTP 顶层字段见 backend/test/test_agent_contract.py；mock 见 frontend/src/api/agent.js
# example 块仅示 params 字段形状；ID、题号、周次、cluster_id 须来自本轮 scope / 查询，勿照抄

version: "0.1.0"
view_enum: [WeekView, QuestionView, StudentView, PortraitView, ScatterView]

view_params:
  WeekView:
    # WeekView.vue：展示选中学生的周格子（非班均折线）；非 report-chart 内嵌时勿省略 student_ids
    # student_ids: 个体诊断仅 1 人；班级报告用 typical_students 2–3 人
    # week_range: [start, end] 与 scope 一致；省略则由 enrich_week_view_week_range 注入会话周次
    # kind/cluster 可选；省略表示当前 student_ids 的全部簇。Agent 只应输出 1 条 WeekView
    kind: { type: integer, enum: [1, 2, 3], optional: true }
    cluster: { type: integer, enum: [0, 1, 2], optional: true, maps_to: "kind = cluster + 1" }
    week_range: { type: array, items: integer, minItems: 2, maxItems: 2, optional: true }
    example:
      view: WeekView
      params:
        student_ids: ["<student_ID>"]
        week_range: [<start>, <end>]

  QuestionView:
    # 锚定题目：优先 title_ids（与正文 TOP 题目一致，1–5 个）；仅弱项知识点时用 knowledge
    title_ids: { type: array, items: string, optional: true, minItems: 1, maxItems: 8 }
    knowledge: { type: string, optional: true }
    example:
      view: QuestionView
      params:
        title_ids: ["Question_<title_id_1>", "Question_<title_id_2>"]

  StudentView:
    # App.vue 写入 setAgentSuggestedStudentIds；StudentView 拉树高亮
    student_ids: { type: array, items: string, required: true, minItems: 1 }
    example:
      view: StudentView
      params:
        student_ids: ["<student_ID>"]

  PortraitView:
    # 前端 handler 待实现；标签支持 cluster_id
    cluster_id: { type: integer, enum: [0, 1, 2], optional: true }
    student_ids: { type: array, items: string, optional: true }
    example:
      view: PortraitView
      params:
        student_ids: ["<student_ID>"]

  ScatterView:
    cluster_id: { type: integer, enum: [0, 1, 2], optional: true }
    student_ids: { type: array, items: string, optional: true }
    example:
      view: ScatterView
      params:
        student_ids: ["<student_ID>"]

archetype_minimum_links:
  trend_decline: [WeekView, QuestionView, StudentView]
  knowledge_weakness: [QuestionView, StudentView]
  student_diagnosis: [WeekView, StudentView, QuestionView, PortraitView, ScatterView]
  class_overview: [WeekView, QuestionView]
