# NorthClassVision 生产环境 Nginx 配置示例
# 用法：根据实际路径修改 root 与 upstream 后，放入 /etc/nginx/conf.d/ 或 include 到主配置

server {
    listen 80;
    server_name localhost;   # 生产环境改为你的域名，如 www.example.com

    # 前端静态资源（Vue 打包后的 dist 目录）
    root /var/www/northclassvision/dist;
    index index.html;

    # 前端 SPA：无 hash 路由时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 将 /api 反向代理到后端 Flask 服务
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源缓存（可选）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# 后端服务地址（与 backend/app.py 中端口一致）
upstream backend {
    server 127.0.0.1:5000;
    keepalive 32;
}
